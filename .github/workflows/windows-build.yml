name: Windows Build

# Build the Windows installers. Run manually from the Actions tab
# (workflow_dispatch), or push a v* tag to also publish a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Needed so tauri-action can create the GitHub Release on tag builds.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows .exe installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Build only the NSIS .exe installer (skip the MSI).
          args: --bundles nsis
          # Only create a Release when triggered by a v* tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Nodrift Launcher {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nodrift-launcher-windows
          if-no-files-found: error
          # Single glob => the artifact contains just the one .exe (no subfolders).
          path: src-tauri/target/release/bundle/nsis/*.exe
